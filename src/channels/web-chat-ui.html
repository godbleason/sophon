<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sophon AI 助手</title>
  <style>
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #242424;
      --bg-input: #1e1e1e;
      --text-primary: #e4e4e7;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --border: #2e2e2e;
      --user-bubble: #2563eb;
      --assistant-bubble: #262626;
      --success: #22c55e;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 顶栏 */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-logo {
      font-size: 24px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
    }

    .header-status {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }

    .status-dot.connected {
      background: var(--success);
    }

    /* 消息区域 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* 消息气泡 */
    .message {
      display: flex;
      gap: 12px;
      max-width: 80%;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      background: var(--bg-tertiary);
    }

    .message.user .message-avatar {
      background: var(--user-bubble);
    }

    .message-content {
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      word-break: break-word;
    }

    .message.user .message-content {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .message-content {
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message-content pre {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0;
      overflow-x: auto;
      font-size: 13px;
    }

    .message-content code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
    }

    .message-content p {
      margin: 4px 0;
    }

    .message-content p:first-child {
      margin-top: 0;
    }

    .message-content p:last-child {
      margin-bottom: 0;
    }

    /* 正在输入指示器 */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      gap: 12px;
      max-width: 80%;
      animation: fadeIn 0.2s ease-out;
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-dots {
      padding: 14px 18px;
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 欢迎页 */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: var(--text-secondary);
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .welcome h2 {
      font-size: 20px;
      color: var(--text-primary);
    }

    .welcome p {
      font-size: 14px;
      max-width: 400px;
      text-align: center;
      line-height: 1.5;
    }

    .welcome-commands {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .welcome-commands button {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .welcome-commands button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* 输入区域 */
    .input-area {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      max-width: 900px;
      margin: 0 auto;
    }

    .input-box {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 9999px;
      transition: border-color 0.15s;
    }

    .input-box:focus-within {
      border-color: var(--accent);
    }

    .input-box textarea {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 6px 12px 6px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 150px;
      min-height: 44px;
    }

    .input-box textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn-wrapper {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 6px 0 0;
    }

    .send-btn {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .send-btn:hover {
      background: var(--accent-hover);
    }

    .send-btn:disabled {
      cursor: not-allowed;
      background: var(--bg-tertiary);
      color: var(--text-muted);
    }

    /* 菜单按钮（输入框内前缀） */
    .menu-container {
      position: relative;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 4px 0 6px;
    }

    .menu-btn {
      width: 34px;
      height: 34px;
      background: var(--bg-tertiary);
      border: none;
      border-radius: 50%;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .menu-btn:hover {
      color: var(--accent);
      background: rgba(99, 102, 241, 0.15);
    }

    .menu-dropdown {
      display: none;
      position: absolute;
      bottom: calc(100% + 12px);
      left: 0;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px 0;
      min-width: 160px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      z-index: 100;
      animation: fadeIn 0.15s ease-out;
    }

    .menu-dropdown.visible {
      display: block;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.1s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .menu-item:hover {
      background: var(--bg-tertiary);
    }

    .menu-item .menu-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    /* 进度步骤容器 */
    .progress-group {
      align-self: flex-start;
      max-width: 80%;
      animation: fadeIn 0.2s ease-out;
    }

    /* 折叠头部（思考完成后显示） */
    .progress-header {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }

    .progress-header:hover {
      color: var(--text-secondary);
      border-color: var(--accent);
    }

    /* 展开状态下 hover 整个组时，header 和 steps 边框同时高亮 */
    .progress-group.expanded:hover .progress-header {
      color: var(--text-secondary);
      border-color: var(--accent);
    }

    .progress-group.expanded:hover .progress-steps {
      border-color: var(--accent);
    }

    .progress-header .chevron {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 10px;
    }

    .progress-group.collapsed .progress-header {
      display: flex;
    }

    .progress-group.collapsed .progress-header .chevron {
      transform: rotate(0deg);
    }

    .progress-group.expanded .progress-header {
      display: flex;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-bottom: none;
    }

    .progress-group.expanded .progress-header .chevron {
      transform: rotate(90deg);
    }

    .progress-steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      max-height: 300px;
      overflow-y: auto;
      transition: max-height 0.3s ease;
    }

    .progress-steps::-webkit-scrollbar {
      width: 4px;
    }

    .progress-steps::-webkit-scrollbar-track {
      background: transparent;
    }

    .progress-steps::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* 折叠状态：隐藏步骤内容 */
    .progress-group.collapsed .progress-steps {
      display: none;
    }

    /* 展开状态：步骤显示并衔接头部圆角，去掉顶部边框与 header 无缝衔接 */
    .progress-group.expanded .progress-steps {
      border-top-left-radius: 0;
      border-top-right-radius: 0;
      border-top: none;
    }

    .progress-step {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.5;
    }

    .progress-step-icon {
      flex-shrink: 0;
      font-size: 14px;
      line-height: 1.5;
    }

    .progress-step-text {
      flex: 1;
      word-break: break-word;
    }

    .progress-step-text .tool-name {
      color: var(--accent);
      font-weight: 600;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
    }

    .progress-step-text .tool-args {
      display: block;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      margin-top: 2px;
      white-space: pre-wrap;
      max-height: 80px;
      overflow: hidden;
    }

    .progress-step-text .tool-result {
      display: block;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      margin-top: 2px;
      white-space: pre-wrap;
      max-height: 120px;
      overflow-y: auto;
      background: var(--bg-primary);
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .progress-step-text .tool-result.error {
      color: #f87171;
      border-color: #7f1d1d;
    }

    .progress-step.active .progress-step-icon {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* 响应式 */
    @media (max-width: 640px) {
      .message { max-width: 90%; }
      .progress-group { max-width: 90%; }
      .messages { padding: 12px; }
      .input-area { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-logo">🤖</span>
    <span class="header-title">Sophon</span>
    <div class="header-status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">连接中...</span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Sophon AI 助手</h2>
      <p>输入消息开始对话，我可以帮你回答问题、执行命令、读写文件等。</p>
      <div class="welcome-commands">
        <button onclick="sendQuickMessage('/help')">📖 帮助</button>
        <button onclick="sendQuickMessage('/tools')">🔧 工具列表</button>
        <button onclick="sendQuickMessage('/status')">📊 状态</button>
        <button onclick="sendQuickMessage('你好，介绍一下你自己')">👋 打招呼</button>
      </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
      <div class="message-avatar">🤖</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <div class="input-box">
        <div class="menu-container">
          <button class="menu-btn" id="menuBtn" title="菜单">☰</button>
          <div class="menu-dropdown" id="menuDropdown">
            <button class="menu-item" onclick="sendCommand('/help')">
              <span class="menu-icon">📖</span>帮助
            </button>
            <button class="menu-item" onclick="sendCommand('/about')">
              <span class="menu-icon">🌟</span>关于平台
            </button>
            <button class="menu-item" onclick="sendCommand('/tools')">
              <span class="menu-icon">🔧</span>工具列表
            </button>
            <button class="menu-item" onclick="sendCommand('/status')">
              <span class="menu-icon">📊</span>状态
            </button>
            <button class="menu-item" onclick="sendCommand('/whoami')">
              <span class="menu-icon">👤</span>我的身份
            </button>
          </div>
        </div>
      <textarea
        id="messageInput"
        placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"
        rows="1"
      ></textarea>
        <div class="send-btn-wrapper">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        ↑
      </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const typingIndicator = document.getElementById('typingIndicator');
    const welcomeEl = document.getElementById('welcome');

    let ws = null;
    let isWaiting = false;
    let isLoadingHistory = false; // 批量加载历史消息时禁止逐条滚动
    let currentProgressEl = null; // 当前进度步骤容器

    // === 持久化客户端身份 ===
    function getClientId() {
      let id = localStorage.getItem('sophon_client_id');
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem('sophon_client_id', id);
      }
      return id;
    }
    const clientId = getClientId();

    // === WebSocket 连接 ===
    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(protocol + '//' + location.host);

      ws.onopen = () => {
        // 连接后立即发送身份标识，让后端恢复 session
        ws.send(JSON.stringify({ type: 'identify', clientId }));
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleServerMessage(data);
      };

      ws.onclose = (event) => {
        statusDot.classList.remove('connected');
        sendBtn.disabled = true;

        if (event.code === 4003) {
          // 同一客户端在另一个标签页打开了新连接，不自动重连
          statusText.textContent = '已在其他标签页打开';
          addMessage('system', '⚠️ 该会话已在另一个标签页中打开，当前标签页已断开。关闭其他标签页后刷新此页面即可恢复。');
          return;
        }

        statusText.textContent = '已断开';
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        statusDot.classList.remove('connected');
        statusText.textContent = '连接错误';
      };
    }

    function handleServerMessage(data) {
      switch (data.type) {
        case 'connected':
          statusDot.classList.add('connected');
          statusText.textContent = '已连接';
          sendBtn.disabled = false;
          inputEl.focus();
          // 重连时先清空已有消息，避免历史消息重复追加
          // 保留 typingIndicator，只移除其他子元素
          while (messagesEl.firstChild) {
            if (messagesEl.firstChild === typingIndicator) break;
            messagesEl.removeChild(messagesEl.firstChild);
          }
          currentProgressEl = null;
          progressStepCount = 0;
          // 如果服务端返回了历史消息，恢复显示
          if (data.history && data.history.length > 0) {
            if (welcomeEl) welcomeEl.style.display = 'none';
            // 批量加载历史消息时禁用逐条滚动
            isLoadingHistory = true;
            for (const msg of data.history) {
              // assistant 消息可能附带思维链步骤
              if (msg.role === 'assistant' && msg.thinkingSteps && msg.thinkingSteps.length > 0) {
                addCollapsedProgressGroup(msg.thinkingSteps);
              }
              addMessage(msg.role, msg.content);
            }
            isLoadingHistory = false;
            // 历史消息加载完毕后，一次性即时滚到底部
            scrollToBottom(true);
          } else if (welcomeEl) {
            // 没有历史消息时恢复欢迎界面
            welcomeEl.style.display = '';
          }
          break;
        case 'progress':
          handleProgress(data);
          break;
        case 'response':
          hideTyping();
          finalizeProgress();
          isWaiting = false;
          addMessage('assistant', data.text);
          break;
      }
    }

    // === 进度展示 ===
    let progressStepCount = 0; // 当前进度组的步骤计数

    function ensureProgressGroup() {
      if (!currentProgressEl) {
        progressStepCount = 0;

        currentProgressEl = document.createElement('div');
        currentProgressEl.className = 'progress-group';

        // 折叠头部（初始隐藏，完成后显示）
        const headerEl = document.createElement('div');
        headerEl.className = 'progress-header';
        headerEl.innerHTML = '<span class="chevron">▶</span><span class="progress-summary">🧠 思考过程</span>';
        headerEl.addEventListener('click', () => {
          toggleProgressGroup(headerEl.parentElement);
        });
        currentProgressEl.appendChild(headerEl);

        // 步骤内容区
        const stepsEl = document.createElement('div');
        stepsEl.className = 'progress-steps';
        currentProgressEl.appendChild(stepsEl);

        messagesEl.insertBefore(currentProgressEl, typingIndicator);
      }
      return currentProgressEl.querySelector('.progress-steps');
    }

    function toggleProgressGroup(groupEl) {
      if (!groupEl) return;
      if (groupEl.classList.contains('collapsed')) {
        groupEl.classList.remove('collapsed');
        groupEl.classList.add('expanded');
      } else if (groupEl.classList.contains('expanded')) {
        groupEl.classList.remove('expanded');
        groupEl.classList.add('collapsed');
      }
    }

    function handleProgress(data) {
      hideTyping();
      const stepsEl = ensureProgressGroup();

      // 将之前的 active 步骤标记为完成
      const prevActive = stepsEl.querySelector('.progress-step.active');
      if (prevActive) {
        prevActive.classList.remove('active');
        const icon = prevActive.querySelector('.progress-step-icon');
        if (icon && icon.textContent === '⏳') icon.textContent = '✅';
      }

      switch (data.step) {
        case 'thinking': {
          progressStepCount++;
          const step = createStepEl('⏳', '正在思考...');
          step.classList.add('active');
          stepsEl.appendChild(step);
          break;
        }
        case 'tool_call': {
          progressStepCount++;
          const argsStr = data.toolArgs ? JSON.stringify(data.toolArgs, null, 2) : '';
          const textEl = document.createElement('span');
          textEl.className = 'progress-step-text';
          textEl.innerHTML = '调用工具 <span class="tool-name">' + escapeHtml(data.toolName) + '</span>'
            + (argsStr ? '<span class="tool-args">' + escapeHtml(truncate(argsStr, 200)) + '</span>' : '');
          const step = createStepElRaw('🔧', textEl);
          step.classList.add('active');
          step.dataset.toolCallId = data.toolCallId || '';
          stepsEl.appendChild(step);
          break;
        }
        case 'tool_result': {
          // 找到对应 tool_call 步骤更新
          const callStep = stepsEl.querySelector('[data-tool-call-id="' + (data.toolCallId || '') + '"]');
          if (callStep) {
            callStep.classList.remove('active');
            const icon = callStep.querySelector('.progress-step-icon');
            if (icon) icon.textContent = data.isError ? '❌' : '✅';
            // 追加结果
            const textEl = callStep.querySelector('.progress-step-text');
            if (textEl && data.content) {
              const resultEl = document.createElement('span');
              resultEl.className = 'tool-result' + (data.isError ? ' error' : '');
              resultEl.textContent = truncate(data.content, 500);
              textEl.appendChild(resultEl);
            }
          }
          break;
        }
        case 'llm_response': {
          if (data.content) {
            progressStepCount++;
            const step = createStepEl('💬', data.content);
            stepsEl.appendChild(step);
          }
          break;
        }
      }

      // 思考过程中，始终滚动到底部
      stepsEl.scrollTop = stepsEl.scrollHeight;
      scrollToBottom();
    }

    function createStepEl(icon, text) {
      const step = document.createElement('div');
      step.className = 'progress-step';
      step.innerHTML = '<span class="progress-step-icon">' + icon + '</span>'
        + '<span class="progress-step-text">' + escapeHtml(text) + '</span>';
      return step;
    }

    function createStepElRaw(icon, contentEl) {
      const step = document.createElement('div');
      step.className = 'progress-step';
      const iconEl = document.createElement('span');
      iconEl.className = 'progress-step-icon';
      iconEl.textContent = icon;
      step.appendChild(iconEl);
      step.appendChild(contentEl);
      return step;
    }

    /**
     * 从历史数据中创建一个已折叠的思维链组（刷新页面后恢复用）
     * 仅当存在工具调用时才渲染，纯 thinking 步骤不显示
     */
    function addCollapsedProgressGroup(thinkingSteps) {
      // 统计工具调用
      const toolCalls = thinkingSteps.filter(s => s.type === 'tool_call');
      const toolCount = toolCalls.length;

      // 没有工具调用（只有 thinking 步骤），不渲染进度组
      if (toolCount === 0) return;

      const groupEl = document.createElement('div');
      groupEl.className = 'progress-group collapsed';

      // 折叠头部
      const headerEl = document.createElement('div');
      headerEl.className = 'progress-header';

      const uniqueNames = [...new Set(toolCalls.map(s => s.toolName).filter(Boolean))];
      const summaryText = '🧠 思考过程 · ' + toolCount + ' 次工具调用'
        + (uniqueNames.length > 0 ? ' (' + uniqueNames.join(', ') + ')' : '');

      headerEl.innerHTML = '<span class="chevron">▶</span><span class="progress-summary">'
        + escapeHtml(summaryText) + '</span>';
      headerEl.addEventListener('click', () => {
        toggleProgressGroup(headerEl.parentElement);
      });
      groupEl.appendChild(headerEl);

      // 步骤内容区
      const stepsEl = document.createElement('div');
      stepsEl.className = 'progress-steps';

      for (const step of thinkingSteps) {
        if (step.type === 'tool_call') {
          const textEl = document.createElement('span');
          textEl.className = 'progress-step-text';
          textEl.innerHTML = '调用工具 <span class="tool-name">' + escapeHtml(step.toolName || '') + '</span>'
            + (step.toolArgs ? '<span class="tool-args">' + escapeHtml(truncate(step.toolArgs, 200)) + '</span>' : '');
          const stepEl = createStepElRaw('🔧', textEl);
          stepsEl.appendChild(stepEl);
        } else if (step.type === 'tool_result') {
          const icon = step.isError ? '❌' : '✅';
          const textEl = document.createElement('span');
          textEl.className = 'progress-step-text';
          let html = escapeHtml(step.toolName || '工具结果');
          if (step.content) {
            html += '<span class="tool-result' + (step.isError ? ' error' : '') + '">'
              + escapeHtml(truncate(step.content, 500)) + '</span>';
          }
          textEl.innerHTML = html;
          const stepEl = createStepElRaw(icon, textEl);
          stepsEl.appendChild(stepEl);
        }
      }

      groupEl.appendChild(stepsEl);
      messagesEl.insertBefore(groupEl, typingIndicator);
    }

    function finalizeProgress() {
      if (currentProgressEl) {
        // 标记所有 active 为完成
        const actives = currentProgressEl.querySelectorAll('.progress-step.active');
        actives.forEach(el => {
          el.classList.remove('active');
          const icon = el.querySelector('.progress-step-icon');
          if (icon && icon.textContent === '⏳') icon.textContent = '✅';
        });

        // 统计工具调用数量
        const toolCalls = currentProgressEl.querySelectorAll('[data-tool-call-id]');
        const toolCount = toolCalls.length;

        if (toolCount === 0) {
          // 没有任何工具调用（只有 thinking 步骤），进度组无实质内容，直接移除
          currentProgressEl.remove();
          currentProgressEl = null;
          progressStepCount = 0;
          return;
        }

        // 有工具调用时，更新摘要并折叠
        const summaryEl = currentProgressEl.querySelector('.progress-summary');
        if (summaryEl) {
          const toolNames = [];
          toolCalls.forEach(el => {
            const nameEl = el.querySelector('.tool-name');
            if (nameEl) toolNames.push(nameEl.textContent);
          });
          const uniqueNames = [...new Set(toolNames)];
          summaryEl.textContent = '🧠 思考过程 · ' + toolCount + ' 次工具调用'
            + (uniqueNames.length > 0 ? ' (' + uniqueNames.join(', ') + ')' : '');
        }

        // 自动折叠
        currentProgressEl.classList.add('collapsed');

        currentProgressEl = null;
        progressStepCount = 0;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function truncate(str, max) {
      if (str.length <= max) return str;
      return str.substring(0, max) + '...';
    }

    // === 消息发送 ===
    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN || isWaiting) return;

      // 隐藏欢迎页
      if (welcomeEl) welcomeEl.style.display = 'none';

      addMessage('user', text);
      ws.send(JSON.stringify({ type: 'message', text }));

      inputEl.value = '';
      inputEl.style.height = 'auto';
      isWaiting = true;
      showTyping();
    }

    function sendQuickMessage(text) {
      inputEl.value = text;
      sendMessage();
    }

    // === 菜单 ===
    const menuBtn = document.getElementById('menuBtn');
    const menuDropdown = document.getElementById('menuDropdown');

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      menuDropdown.classList.toggle('visible');
    });

    // 点击页面其他地方关闭菜单
    document.addEventListener('click', () => {
      menuDropdown.classList.remove('visible');
    });

    function sendCommand(cmd) {
      menuDropdown.classList.remove('visible');
      sendQuickMessage(cmd);
    }

    // === UI 辅助 ===
    function addMessage(role, text) {
      const msgEl = document.createElement('div');
      msgEl.className = 'message ' + role;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = role === 'user' ? '👤' : '🤖';

      const content = document.createElement('div');
      content.className = 'message-content';
      content.innerHTML = formatMessage(text);

      msgEl.appendChild(avatar);
      msgEl.appendChild(content);

      // 插入到 typing indicator 之前
      messagesEl.insertBefore(msgEl, typingIndicator);
      if (!isLoadingHistory) {
        scrollToBottom();
      }
    }

    function formatMessage(text) {
      // 代码块
      text = text.replace(/```(\w*)?\\n([\\s\\S]*?)```/g, '<pre><code>$2</code></pre>');
      // 行内代码
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      // 粗体
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // 换行
      text = text.replace(/\n/g, '<br>');
      return text;
    }

    function showTyping() {
      typingIndicator.classList.add('visible');
      scrollToBottom();
    }

    function hideTyping() {
      typingIndicator.classList.remove('visible');
    }

    function scrollToBottom(instant) {
      requestAnimationFrame(() => {
        if (instant) {
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } else {
          messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
        }
      });
    }

    // === 输入框处理 ===
    let isComposing = false; // 输入法组合状态

    inputEl.addEventListener('compositionstart', () => { isComposing = true; });
    inputEl.addEventListener('compositionend', () => { isComposing = false; });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !isComposing) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
    });

    // === 启动 ===
    connect();
  </script>
</body>
</html>
